name: Android Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: 拉取代码 Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 安装 JDK Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: 安装 Android SDK Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: 配置 Gradle Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: wrapper
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: 授权脚本 Grant Permission
        run: chmod +x gradlew

      - name: 构建 Build
        run: ./gradlew assembleOnlineRelease assembleOfflineRelease --build-cache

      - name: 上传 Debug APK Upload Debug Artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: debug-apks
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error

      - name: 准备签名 APK Prepare APKs for Signing
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p app/build/outputs/apk/release
          cp app/build/outputs/apk/online/release/*.apk app/build/outputs/apk/release/online-release-unsigned.apk
          cp app/build/outputs/apk/offline/release/*.apk app/build/outputs/apk/release/offline-release-unsigned.apk

      - name: 签名 Sign APK
        if: github.event_name != 'pull_request'
        id: sign_app
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: 版本检测 Version Check
        if: github.event_name != 'pull_request'
        id: version_check
        run: |
          V_NAME=$(grep "versionName =" app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          echo "name=$V_NAME" >> $GITHUB_OUTPUT

          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT
          fi

          # 检查版本是否变化
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            PREV_V_NAME=$(git show HEAD~1:app/build.gradle.kts | grep "versionName =" | sed 's/.*"\(.*\)".*/\1/')
            if [ "$V_NAME" != "$PREV_V_NAME" ]; then
              echo "changed=true" >> $GITHUB_OUTPUT
            else
              echo "changed=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: 重命名 Rename Signed APKs
        if: github.event_name != 'pull_request' && steps.version_check.outputs.changed == 'true'
        run: |
          V_NAME="${{ steps.version_check.outputs.name }}"
          if [ -f "app/build/outputs/apk/release/online-release-unsigned-signed.apk" ]; then
            mv app/build/outputs/apk/release/online-release-unsigned-signed.apk HyperLyric-v${V_NAME}-online.apk
          fi
          if [ -f "app/build/outputs/apk/release/offline-release-unsigned-signed.apk" ]; then
            mv app/build/outputs/apk/release/offline-release-unsigned-signed.apk HyperLyric-v${V_NAME}-offline.apk
          fi

      - name: 生成发布说明 Generate Release Body
        if: github.event_name != 'pull_request' && steps.version_check.outputs.changed == 'true'
        id: release_body
        run: |
          echo "body<<EOF" >> $GITHUB_OUTPUT
          PREV_TAG="${{ steps.version_check.outputs.prev_tag }}"
          if [ -z "$PREV_TAG" ]; then
            git log --pretty=format:"%s" --no-merges | awk '!seen[$0]++' | awk 'NF' | head -20 | awk '{print NR "、" $0}' >> $GITHUB_OUTPUT
          else
            git log $PREV_TAG..HEAD --pretty=format:"%s" --no-merges | awk '!seen[$0]++' | awk 'NF' | head -20 | awk '{print NR "、" $0}' >> $GITHUB_OUTPUT
          fi
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 创建发布 Create Release
        if: github.event_name != 'pull_request' && steps.version_check.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version_check.outputs.name }}
          name: HyperLyric v${{ steps.version_check.outputs.name }}
          body: ${{ steps.release_body.outputs.body }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            HyperLyric-v${{ steps.version_check.outputs.name }}-online.apk
            HyperLyric-v${{ steps.version_check.outputs.name }}-offline.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
